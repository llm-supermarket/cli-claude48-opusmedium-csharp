name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            suffix: linux-amd64
          - rid: linux-arm64
            suffix: linux-arm64
          - rid: osx-x64
            suffix: darwin-amd64
          - rid: osx-arm64
            suffix: darwin-arm64
          - rid: win-x64
            suffix: windows-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish single-file binary
        run: |
          dotnet publish src/Cli/RcloneCrypt.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/${{ matrix.rid }}

      - name: Package binary (unix)
        if: matrix.rid != 'win-x64'
        run: |
          cp publish/${{ matrix.rid }}/cli-claude48-opusmedium-csharp \
             cli-claude48-opusmedium-csharp-${{ matrix.suffix }}
          chmod +x cli-claude48-opusmedium-csharp-${{ matrix.suffix }}
          tar czf cli-claude48-opusmedium-csharp-${{ matrix.suffix }}.tar.gz \
             cli-claude48-opusmedium-csharp-${{ matrix.suffix }}

      - name: Package binary (windows)
        if: matrix.rid == 'win-x64'
        run: |
          cp publish/${{ matrix.rid }}/cli-claude48-opusmedium-csharp.exe \
             cli-claude48-opusmedium-csharp-${{ matrix.suffix }}.exe

      - name: Upload artifact (unix)
        if: matrix.rid != 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-claude48-opusmedium-csharp-${{ matrix.suffix }}
          path: cli-claude48-opusmedium-csharp-${{ matrix.suffix }}.tar.gz

      - name: Upload artifact (windows)
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-claude48-opusmedium-csharp-${{ matrix.suffix }}
          path: cli-claude48-opusmedium-csharp-${{ matrix.suffix }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Switch to main branch
        run: |
          git checkout main
          git pull --rebase origin main

      - name: Update Scoop manifest
        shell: pwsh
        run: ./updatescoop.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Update Brew formula
        shell: pwsh
        run: ./updatebrew.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update package manifests to ${{ github.ref_name }}"
          file_pattern: "cli-claude48-opusmedium-csharp.json Formula/cli-claude48-opusmedium-csharp.rb"
